<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication</title>
    <!-- Add your CSS link here -->
</head>
<body>
    <header>
        <h1>User Authentication</h1>
        <!-- Add any navigation links/buttons here -->
    </header>

    <main>
        <section id="login-section">
            <h2>Login</h2>
            <form id="login-form" action="{% url 'users:login' %}" method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Login</button>
            </form>
        </section>

        <section id="register-section">
            <h2>Register</h2>
            <form id="register-form" action="{% url 'users:register' %}" method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Register</button>
            </form>
        </section>
    </main>

    <footer>
        <!-- Add footer content here, if any -->
    </footer>

    <!-- Add your JavaScript link here -->
</body>
</html>
